{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="w-100 p-5" style="max-width: 450px; background: #000; border: 2px solid #fff;">
        <div class="text-center mb-5">
            <h2 class="text-white fw-bold mb-2 text-uppercase" style="letter-spacing: 2px; font-family: monospace;">Establish ID</h2>
            <p class="text-muted small" style="font-family: monospace;">[ GENERATE NEW CREDENTIALS ]</p>
        </div>
        
        <form method="POST" action="/register">
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold text-uppercase" style="font-family: monospace;">Username</label>
                <div class="input-group">
                    <span class="input-group-text rounded-0 border-secondary text-muted" style="background: #111;"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control rounded-0 border-secondary text-white" name="username" required style="background: #000;">
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label text-muted small fw-bold text-uppercase" style="font-family: monospace;">Password</label>
                <div class="input-group">
                    <span class="input-group-text rounded-0 border-secondary text-muted" style="background: #111;"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control rounded-0 border-secondary text-white" name="password" required style="background: #000;">
                </div>
            </div>
            
            <button type="submit" class="btn btn-outline-light w-100 py-2 fw-bold rounded-0 mb-4" style="letter-spacing: 2px; font-family: monospace; text-transform: uppercase;">Register</button>
            
            <div class="text-center text-muted small" style="font-family: monospace;">
                EXISTING ID? <a href="/login" class="text-white fw-bold text-decoration-none border-bottom border-white">AUTHENTICATE</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
