<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NetAssist AI • Security & Log Intelligence</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ range(1, 100000) | random }}">

    <style>
        body {
            background: #0b1220;
            color: #e5e7eb;
            font-family: 'Poppins', sans-serif;
        }

        .navbar-custom {
            background: rgba(15, 23, 42, 0.95);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            backdrop-filter: blur(10px);
        }

        .container {
            max-width: 1200px;
        }

        .card,
        .card-custom {
            background: rgba(17, 25, 40, 0.85);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
        }

        h1,h2,h3,h4,h5,h6 {
            color: #f8fafc;
        }

        p, span, small, li, td, th {
            color: #cbd5e1;
        }

        .text-muted {
            color: #94a3b8 !important;
        }

        a {
            color: #38bdf8;
            text-decoration: none;
        }

        a:hover {
            color: #0ea5e9;
        }

        .status-pill {
            background: rgba(34,197,94,0.15);
            color: #4ade80;
            padding: 5px 12px;
            border-radius: 999px;
            font-size: 12px;
            border: 1px solid rgba(34,197,94,0.3);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .footer-section {
            border-top: 1px solid rgba(255,255,255,0.06);
            background: rgba(15, 23, 42, 0.6);
            margin-top: 60px;
            padding: 20px 0;
        }

        .footer-logo {
            color: #f8fafc;
            font-weight: 600;
        }

        .footer-text, .footer-version {
            color: #94a3b8;
            font-size: 13px;
        }

        .btn-primary {
            background: #2563eb;
            border: none;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container">

            <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">
                <i class="fas fa-shield-alt me-2 text-info"></i>
                NetAssist AI
            </a>

            <div class="d-flex align-items-center gap-2">
                <div class="status-pill">
                    <span class="status-dot"></span>
                    LIVE MONITORING
                </div>
            </div>

        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <footer class="footer-section">
        <div class="container d-flex justify-content-between">

            <div>
                <div class="footer-logo">NetAssist AI</div>
                <div class="footer-text">Security & Log Intelligence Platform</div>
            </div>

            <div class="text-end">
                <div class="footer-text">System Status: Online</div>
                <div class="footer-version">v1.0 • SOC Simulation</div>
            </div>

        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    {% block scripts %}{% endblock %}

</body>

</html>
