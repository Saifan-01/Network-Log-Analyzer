<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NetAssist AI • Network Log Analyzer</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ range(1, 100000) | random }}">

    <!-- FORCE WHITE TEXT (ONLY CHANGE) -->
    <style>
        body {
            color: #ffffff !important;
        }

        p, span, small, li, td, th, h1, h2, h3, h4, h5, h6, div {
            color: #ffffff !important;
        }

        a {
            color: #ffffff !important;
        }

        .text-muted {
            color: #cbd5e1 !important;
        }

        .brand-subtitle,
        .footer-text,
        .footer-version {
            color: #cbd5e1 !important;
        }

        .table,
        .table td,
        .table th {
            color: #ffffff !important;
        }

        .card,
        .card-custom,
        .alert {
            color: #ffffff !important;
        }

        input,
        textarea {
            color: #ffffff !important;
        }

        .small {
            color: #e2e8f0 !important;
        }
    </style>

</head>

<body>

    <!-- Background Blur Circles -->
    <div class="bg-blur bg-blur-1"></div>
    <div class="bg-blur bg-blur-2"></div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container">

            <a class="navbar-brand d-flex align-items-center" href="{{ url_for('index') }}">

                <div class="logo-icon me-3">
                    <i class="fas fa-network-wired"></i>
                </div>

                <div>
                    <div class="brand-title">
                        NetAssist AI
                    </div>

                    <div class="brand-subtitle">
                        Smart Network Monitoring
                    </div>
                </div>

            </a>

            <div class="d-flex align-items-center gap-3">

                <div class="status-pill">
                    <span class="status-dot"></span>
                    System Active
                </div>

                <div class="text-end d-none d-md-block">
                    <div class="small text-secondary">
                        AI-Assisted
                    </div>

                    <div style="font-size: 0.85rem;">
                        Log Intelligence Dashboard
                    </div>
                </div>

            </div>

        </div>
    </nav>

    <div class="container mt-5">
        {% block content %}{% endblock %}
    </div>

    <footer class="footer-section mt-5">
        <div class="container">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-center">

                <div class="footer-left mb-3 mb-md-0">
                    <div class="footer-logo">
                        <i class="fas fa-microchip me-2"></i>
                        NetAssist AI
                    </div>
                    <div class="footer-text">
                        Built for network diagnostics & intelligent log monitoring.
                    </div>
                </div>

                <div class="footer-right text-md-end">
                    <div class="footer-status">
                        <i class="fas fa-circle text-success me-2"></i>
                        Monitoring Services Online
                    </div>
                    <div class="footer-version">
                        Version 1.0 • Student Project
                    </div>
                </div>

            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    {% block scripts %}{% endblock %}

</body>
</html>
